#####################################################################
#                  Mellow LLL Plus Filament Buffer
#                  Klipper Plugin Configuration
#####################################################################
## Real-time buffer control via extruder_stepper trapq sync and
## hall sensor feedback. Install buffer.py first:
##   cd ~/lll-plus-klipper-plugin/klipper && ./install.sh

[mcu LLL_PLUS]
serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_12345-if00
restart_method: command

[temperature_sensor LLL_PLUS]
sensor_type: temperature_mcu
sensor_mcu: LLL_PLUS
min_temp: 0
max_temp: 100

#####################################################################
#                  Buffer Stepper & TMC2208 (TMC2225)
#####################################################################

[extruder_stepper buffer_stepper]
extruder: extruder
step_pin: LLL_PLUS:PC13
dir_pin: LLL_PLUS:PA7
enable_pin: !LLL_PLUS:PA6
microsteps: 16
gear_ratio: 50:17
rotation_distance: 19.2357

[tmc2208 extruder_stepper buffer_stepper]
uart_pin: LLL_PLUS:PB1
run_current: 0.3
sense_resistor: 0.150
stealthchop_threshold: 999999

#####################################################################
#                  Buffer Plugin
#####################################################################

[buffer]
stepper: buffer_stepper
## Optional: bind this buffer to a specific extruder.  When set, the
## buffer only syncs while this extruder is the active one, and
## auto-syncs/unsyncs on tool changes.  Omit for a single-buffer
## printer that should follow whatever extruder is currently active.
#extruder: extruder
debug: True
## Hall sensors (active when blocked = HIGH, pins inverted)
sensor_empty_pin: ^!LLL_PLUS:PB4
#   HALL3 / pos1: buffer nearly empty
sensor_middle_pin: ^!LLL_PLUS:PB3
#   HALL2 / pos2: ideal middle zone (dead-band target)
sensor_full_pin: ^!LLL_PLUS:PB2
#   HALL1 / pos3: buffer overfull
## Filament presence switch
material_switch_pin: ^!LLL_PLUS:PB7
#   LOW = filament present, HIGH = no filament (inverted)
## Manual buttons (active LOW, inverted)
feed_button_pin: ^!LLL_PLUS:PB12
retract_button_pin: ^!LLL_PLUS:PB13

## Rotation distance feedback gains
drift_gain: 0.02
#   Multiplier offset applied in EMPTY_MIDDLE / FULL_MIDDLE zones.
#   Larger values correct faster but risk overshoot. (0.0-0.5)
multiplier_low: 0.9
#   Absolute rd_multiplier in the FULL safety zone (under-feed to drain
#   the loop).  AFC default 0.9 = 10% under-feed.  Lower = more
#   aggressive.  (0.0-1.0)
multiplier_high: 1.1
#   Absolute rd_multiplier in the EMPTY safety zone (over-feed to fill
#   the loop).  AFC default 1.1 = 10% over-feed.  Higher = more
#   aggressive.  (>= 1.0)
fault_multiplier_low: 0.36
#   Absolute rd_multiplier applied in FULL after fault_escalation_time
#   seconds.  AFC formula (multiplier_low * 2) / 5 -> 0.36 = 64%
#   under-feed.  Drains a stuck-full loop fast at high flow rates.
fault_multiplier_high: 1.65
#   Absolute rd_multiplier applied in EMPTY after fault_escalation_time
#   seconds.  AFC formula multiplier_high * 1.5 -> 1.65 = 65% over-feed.
fault_escalation_time: 5.0
#   Seconds in a safety zone before escalating to fault_multiplier_*.
empty_safety_timeout: 30.0
#   Seconds in the EMPTY zone before raising an error.
full_safety_timeout: 10.0
#   Seconds in the FULL zone before forced retract.

## Manual feed/retract
manual_speed: 15.0
#   Speed (mm/s) for manual feed/retract via buttons or BUFFER_FEED.
manual_accel: 100.0
#   Acceleration (mm/s^2) for manual feed/retract moves.
manual_move_distance: 10.0
#   Distance (mm) of each manual move chunk: button-held feed/retract,
#   forced safety retract, BUFFER_FEED/RETRACT continuous mode, and
#   BUFFER_RETRACT_UNTIL_CLEAR.  Smaller chunks = finer control.

## Error handling
error_clear_hold_time: 2.0
#   Seconds both buttons must be held to clear an error state.
pause_on_runout: True
#   Pause print on filament runout or safety timeout error.

## Initial fill
initial_fill_timeout: 10.0
#   Seconds to feed forward when filament is first inserted.
manual_feed_full_timeout: 3.0
#   Seconds the full sensor must stay triggered during manual feed
#   before auto-stopping. Also used as the stop condition for
#   BUFFER_FEED with no DIST argument.

## Control timer
control_interval: 0.5
#   Reactor timer interval (seconds) for safety timeout checks.
#   Also used to poll for extruder tool changes.

#####################################################################
#                  Multi-Buffer Setup (optional)
#####################################################################
## For multi-extruder printers with a dedicated buffer per extruder,
## use named [buffer <name>] sections and bind each to its extruder
## via the 'extruder' parameter.  Each buffer is fully independent:
## own sensors, stepper, state machine, and feedback loop.  The buffer
## auto-syncs when its extruder becomes active and unsyncs otherwise.
##
## Example — two buffers for a dual-extruder printer:
#
# [extruder_stepper buffer_stepper_t0]
# extruder: extruder
# step_pin: ...
# ...
#
# [buffer buffer_t0]
# stepper: buffer_stepper_t0
# extruder: extruder
# sensor_empty_pin: ...
# sensor_middle_pin: ...
# sensor_full_pin: ...
# material_switch_pin: ...
#
# [extruder_stepper buffer_stepper_t1]
# extruder: extruder1
# step_pin: ...
# ...
#
# [buffer buffer_t1]
# stepper: buffer_stepper_t1
# extruder: extruder1
# sensor_empty_pin: ...
# sensor_middle_pin: ...
# sensor_full_pin: ...
# material_switch_pin: ...
#
## GCode examples:
##   BUFFER_STATUS BUFFER=buffer_t0    # query a specific buffer
##   BUFFER_ENABLE BUFFER=buffer_t1    # enable a specific buffer
##   BUFFER_STATUS                     # targets [buffer] (bare section)
##                                     # — errors if no bare [buffer]
