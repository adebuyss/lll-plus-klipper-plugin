#####################################################################
#                  Mellow LLL Plus Filament Buffer
#                  Klipper Plugin Configuration
#####################################################################
## Replaces the macro-based mellow-plus.cfg with a real-time
## Klipper extras module. Install buffer.py first:
##   cd ~/Buffer/klipper && ./install.sh

[mcu LLL_PLUS]
serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_12345-if00
restart_method: command

[temperature_sensor LLL_PLUS]
sensor_type: temperature_mcu
sensor_mcu: LLL_PLUS
min_temp: 0
max_temp: 100

#####################################################################
#                  Buffer Stepper & TMC2208 (TMC2225)
#####################################################################

[manual_stepper buffer_stepper]
step_pin: LLL_PLUS:PC13
dir_pin: LLL_PLUS:PA7
enable_pin: !LLL_PLUS:PA6
microsteps: 16
gear_ratio: 50:17
rotation_distance: 19.2357

[tmc2208 manual_stepper buffer_stepper]
uart_pin: LLL_PLUS:PB1
run_current: 0.3
sense_resistor: 0.150
stealthchop_threshold: 999999

#####################################################################
#                  Buffer Plugin
#####################################################################

[buffer]
stepper: buffer_stepper 
debug: True
## Hall sensors (active when blocked = HIGH, pins inverted)
sensor_empty_pin: ^!LLL_PLUS:PB4
#   HALL3 / pos1: buffer nearly empty, motor feeds forward
sensor_middle_pin: ^!LLL_PLUS:PB3
#   HALL2 / pos2: ideal middle zone, motor matches extruder
sensor_full_pin: ^!LLL_PLUS:PB2
#   HALL1 / pos3: buffer overfull, motor retracts
## Filament presence switch
material_switch_pin: ^!LLL_PLUS:PB7
#   LOW = filament present, HIGH = no filament (inverted)
## Manual buttons (active LOW, inverted)
feed_button_pin: ^!LLL_PLUS:PB12
retract_button_pin: ^!LLL_PLUS:PB13
## Motor parameters
speed_rpm: 120
#   Base motor speed (RPM). Used for safety overrides and manual ops.
## Control parameters
forward_timeout: 60.0
#   Seconds of continuous forward before error. 0 to disable.
correction_factor: 1.3
#   Speed multiplier when catching up from empty-side drift.
velocity_factor: 1.05
#   Speed multiplier in middle zone and no-sensors zone to compensate
#   for tube friction and mechanical losses. (0.9-2.0)
slowdown_factor: 0.5
#   Speed multiplier when buffer is in the full zone. Motor slows to
#   extruder_velocity * slowdown_factor before retracting. (0.0-1.0)
full_zone_timeout: 3.0
#   Seconds in the full zone before switching from slowdown to active
#   retract. Allows the buffer to naturally drain before forcing retract.
full_zone_retract_length: 0
#   Max retract distance (mm) after full zone timeout. 0 = retract
#   until middle sensor triggers (unlimited).
min_extrusion_velocity: 0.05
#   Minimum extruder velocity (mm/s) to be considered "actively extruding".
#   Below this the buffer motor stops. Lower for fine-detail printing.
burst_feed_time: 0.5
#   Seconds to feed at full speed when burst triggers from empty-while-stopped.
burst_delay: 0.5
#   Seconds to wait in stopped+empty state before triggering a burst.
#   Prevents bursting on momentary travel moves.
initial_fill_timeout: 10.0
#   Seconds to feed forward continuously when filament is first inserted.
#   Bypasses burst logic to allow the buffer tube to fill. If the filament
#   reaches the middle sensor before timeout, normal zone logic takes over.
pause_on_runout: True
#   Pause print on filament runout or forward timeout error.
follow_retract: True
#   Follow extruder retractions (motor goes BACK) when not printing.
#   During printing, retractions are handled by velocity smoothing instead.
control_interval: 0.25
#   Reactor timer interval (seconds) for velocity tracking.
drive_interval: 0.1
#   Minimum interval (seconds) between motor UART writes. Rate-limits
#   deferred drive callbacks to avoid overwhelming the TMC2208. (0.02-1.0)
velocity_window: 0.3
#   Sliding window duration (seconds) for smoothed velocity. Bridges
#   brief retraction gaps during infill direction changes. (0.0-2.0)
manual_feed_full_timeout: 5.0
#   Seconds the full sensor must stay triggered during manual feed
#   (BUFFER_FEED or feed button) before auto-stopping. Detects when
#   filament has reached the extruder during loading.

